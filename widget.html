    <script type="text/javascript">
        $(document).ready(function () {
            // $("#updateTicket").before('<button id="backButton" class="btn btn-primary" style="margin-right: 10px;">Back</button>');

            if (window.location.href.indexOf('edit') > 0) {

        // Function to fetch Deals (Folios) for a Contact
        function fetchTransactionsByContactId(contactID) {
            console.log("[DEBUG] Fetching Deals for Contact ID:", contactID);
            var reqObj = {
                url: 'https://www.zohoapis.in/crm/v2/Deals/search?criteria=((Applicant_1:equals:' + contactID + '))',
                headers: { 'Content-Type': 'application/json' },
                data: {}, type: 'GET', postBody: {}, connectionLinkName: "getdataforsearch"
            };

            ZOHODESK.request(reqObj).then(function (response) {
                var j = JSON.parse(response);
                var fj = JSON.parse(j.response);
                var deals = fj.statusMessage ? fj.statusMessage.data : (fj.data ? fj.data : []);
                console.log("[DEBUG] Deals found:", deals);

                if (deals && deals.length > 0) {
                    var $el = $("#myTable tbody");
                    $el.empty();

                    $.each(deals, function (index, dealObj) {
                        var fundName = (dealObj.Fund_Name && dealObj.Fund_Name.name) ? dealObj.Fund_Name.name : 'N/A';
                        var planType = dealObj.Plan_Type ? dealObj.Plan_Type : 'N/A';
                        var folioName = dealObj.Folio_Number || dealObj.Deal_Name || 'N/A';
                        var app1Name = (dealObj.Applicant_1 && dealObj.Applicant_1.name) ? dealObj.Applicant_1.name : 'N/A';
                        var app1Id = (dealObj.Applicant_1 && dealObj.Applicant_1.id) ? dealObj.Applicant_1.id : contactID;

                        var $tr = $('<tr>').append(
                            $('<td style="padding:10px 6px 4px;">').html('<input type="radio" name="selectedTransactionDetails" value="' + app1Id + '" attrFolio="' + folioName + '" attrFundName="' + fundName + '" attrFundType="' + planType + '">'),
                            $('<td>').text(folioName),
                            $('<td>').text(app1Name),
                            $('<td style="cursor: pointer;" title="Plan : ' + planType + '">').text(fundName)
                        );
                        $el.append($tr);
                    });

                    setTimeout(function () {
                        $('.foliosearchdiv').show();
                        $('.loader-main').hide();
                        $('.formdiv').hide();
                        $("#errorTab").hide();
                    }, 1000);

                } else {
                    console.log("[DEBUG] No Deals found for Contact ID", contactID);
                    $("#innerErrorTab").text("No Data Found! The Contact has no Deals (Folios) in CRM.");
                    $('.foliosearchdiv').hide();
                    $('.loader-main').hide();
                    $("#errorTab").show();
                }
            }).catch(function (err) {
                console.error("[DEBUG] Error fetching Deals for Contact", err);
                $("#innerErrorTab").text("Failed to fetch Deals for this Contact.");
                $('.foliosearchdiv').hide();
                $('.loader-main').hide();
                $("#errorTab").show();
            });
        }
        $(document).on('click', '#searchclick', function (e) {
            e.preventDefault();
            $('.loader-main').show();
            var searchby = $("input[name='searchby']:checked").val();
            if (searchby == 'foliono') {
                var folioNo = $("#foliono").val();
                var reqObj = {
                    url: 'https://www.zohoapis.in/crm/v2/Deals/search?criteria=((Folio_Number:equals:' + folioNo + '))',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    data: {},
                    type: 'GET',
                    postBody: {},
                    connectionLinkName: "getdataforsearch"
                }
                ZOHODESK.request(reqObj).then(function (response) {
                    var json1 = JSON.parse(response);
                    console.log(json1);

                    var finalJSON = JSON.parse(json1.response);
                    console.log(finalJSON);
                    // alert('sds');
                    if (!finalJSON.statusMessage || !finalJSON.statusMessage.data || finalJSON.statusMessage.data.length === 0) {
                        throw new Error("No data found");
                    }
                    var allDealsData = finalJSON.statusMessage.data;
                    var $el = $("#myTable tbody");
                    $el.empty();
                    if (allDealsData && allDealsData.length != 0) {
                        $.each(allDealsData, function (key, dealObj) {
                            var fundName = (dealObj.Fund_Name && dealObj.Fund_Name.name) ? dealObj.Fund_Name.name : 'N/A';
                            var planType = dealObj.Plan_Type ? dealObj.Plan_Type : 'N/A';
                            var folioName = dealObj.Folio_Number || dealObj.Deal_Name || 'N/A';
                            var app1Name = (dealObj.Applicant_1 && dealObj.Applicant_1.name) ? dealObj.Applicant_1.name : 'N/A';
                            var app1Id = (dealObj.Applicant_1 && dealObj.Applicant_1.id) ? dealObj.Applicant_1.id : '';

                            var $tr = $('<tr>').append(
                                $('<td style="padding:10px 6px 4px;">').html('<input type="radio" name="selectedTransactionDetails" value="' + app1Id + '" attrFolio="' + folioName + '" attrFundName="' + fundName + '" attrFundType="' + planType + '">'),
                                $('<td>').text(folioName),
                                $('<td>').text(app1Name),
                                $('<td style="cursor: pointer;" title="Plan : ' + planType + '">').text(fundName)
                            );
                            $el.append($tr);
                            setTimeout(function () {
                                $('.foliosearchdiv').show();
                                $('.loader-main').hide();
                                $('.formdiv').hide();
                                $("#errorTab").hide();
                            }, 1000);
                        });
                    } else {
                        $("#innerErrorTab").text("No Data Found!");
                        $('.foliosearchdiv').hide();
                        $('.loader-main').hide();
                        $("#errorTab").show();
                    }
                }).catch(function (err) {
                    $("#innerErrorTab").text("Folio number not found! Please try with valid Folio Number.");
                    $("#errorTab").show();
                    $('.loader-main').hide();
                    // console.log(err);

                });
            } else if (searchby == 'email') {
                var email = $("#email").val();
                var reqObj = {
                    url: 'https://www.zohoapis.in/crm/v2/Contacts/search?criteria=((Email:equals:' + email + '))',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    data: {},
                    type: 'GET',
                    postBody: {},
                    connectionLinkName: "getdataforsearch"
                }
                ZOHODESK.request(reqObj).then(function (response) {
                    var json4 = JSON.parse(response);
                    var finalJSON4 = JSON.parse(json4.response);

                    if (!finalJSON4.statusMessage || !finalJSON4.statusMessage.data || finalJSON4.statusMessage.data.length === 0) {
                        throw new Error("No data found");
                    }
                    var contactID = finalJSON4.statusMessage.data[0].id;
                    fetchTransactionsByContactId(contactID);
                }).catch(function (err) {
                    $("#innerErrorTab").text("Valid transaction data against this email is not found!");
                    $('.foliosearchdiv').hide();
                    $('.loader-main').hide();
                    $("#errorTab").show();
                    // console.log(err);
                });
            } else if (searchby == 'pan') {
                var pan = $("#pan").val();
                var reqObj = {
                    url: 'https://www.zohoapis.in/crm/v2/Contacts/search?criteria=((PAN_Number:equals:' + pan + '))',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    data: {},
                    type: 'GET',
                    postBody: {},
                    connectionLinkName: "getdataforsearch"
                }
                ZOHODESK.request(reqObj).then(function (response) {
                    console.log("[DEBUG PAN Search] Raw Response:", response);
                    var json4 = JSON.parse(response);
                    var finalJSON4 = JSON.parse(json4.response);
                    console.log("[DEBUG PAN Search] Parsed response body:", finalJSON4);

                    if (finalJSON4 && !finalJSON4.statusMessage && finalJSON4.data) {
                        console.log("[DEBUG PAN Search] Found 'data' directly. Assigning to statusMessage.data");
                        finalJSON4.statusMessage = { data: finalJSON4.data };
                    }

                    if (!finalJSON4.statusMessage || !finalJSON4.statusMessage.data || finalJSON4.statusMessage.data.length === 0) {
                        throw new Error("No data found");
                    }
                    var contactID = finalJSON4.statusMessage.data[0].id;
                    fetchTransactionsByContactId(contactID);
                }).catch(function (err) {
                    $("#innerErrorTab").text("Valid transaction data against this PAN is not found!");
                    $('.foliosearchdiv').hide();
                    $('.loader-main').hide();
                    $("#errorTab").show();
                    // console.log(err);
                });
            } else if (searchby == 'phone') {
                var phone = $("#phone").val();
                // alert(phone);
                var reqObj = {
                    url: 'https://www.zohoapis.in/crm/v2/Contacts/search?criteria=((Mobile:equals:' + phone + '))',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    data: {},
                    type: 'GET',
                    postBody: {},
                    connectionLinkName: "getdataforsearch"
                }
                ZOHODESK.request(reqObj).then(function (response) {
                    var json4 = JSON.parse(response);
                    var finalJSON4 = JSON.parse(json4.response);
                    var allContact = finalJSON4.statusMessage.data;
                    if (allContact && allContact.length != 0) {
                        var $el = $("#myTable tbody");
                        $el.empty();
                        $.each(allContact, function (ckey, cobj) {
                            fetchTransactionsByContactId(cobj.id);
                        });
                    }
                }).catch(function (err) {
                    $("#innerErrorTab").text("Valid transaction data against this phone number is not found!");
                    $('.foliosearchdiv').hide();
                    $('.loader-main').hide();
                    $("#errorTab").show();
                    // console.log(err);
                });
            } else if (searchby == 'accountno') {
                var accountno = $("#accountno").val();
                var reqObj = {
                    url: 'https://www.zohoapis.in/crm/v2/Contacts/search?criteria=((Bank_Account_Number:equals:' + accountno + '))',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    data: {},
                    type: 'GET',
                    postBody: {},
                    connectionLinkName: "getdataforsearch"
                }
                ZOHODESK.request(reqObj).then(function (response) {
                    var json4 = JSON.parse(response);
                    var finalJSON4 = JSON.parse(json4.response);
                    var allContact = finalJSON4.statusMessage.data;
                    // var contactID = finalJSON4.statusMessage.data[0].id;
                    if (allContact && allContact.length != 0) {
                        var $el = $("#myTable tbody");
                        $el.empty();
                        $.each(allContact, function (ckey, cobj) {
                            fetchTransactionsByContactId(cobj.id);
                        });
                    }
                }).catch(function (err) {
                    $("#innerErrorTab").text("Valid transaction data against this bank account number is not found!");
                    $('.foliosearchdiv').hide();
                    $('.loader-main').hide();
                    $("#errorTab").show();
                    // console.log(err);

                });
            }
        });
        $('#backButton').click(function () {
            // e.preventDefault();
            console.log("Back Button Clicked");
            $('.foliosearchdiv').hide();
            $('.formdiv').show();
            $("#foliono").val('');
            $('#email').val('');
            $("#pan").val('');
            $('#phone').val('');
            $("#accountno").val('');

        // Show error popup instead of alert
        function showErrorPopup(message) {
            $('.loader-main').hide();

            $('body').append(`
            <div class="popup-error" id="errorPopup">
                <div class="popup-content">
                    <p>${message}</p>
                    <button id="popupClose">Close</button>
                </div>
            </div>
        `);

            $('#popupClose').click(function () {
                console.log("Error Clicked Again");
                $('#errorPopup').remove();
                $("input[name='selectedTransactionDetails']:checked").prop('checked', false);
                // e.preventDefault();
                // $('.foliosearchdiv').hide();
                // $('.formdiv').show();
                // history.back();
            });
        }

        // ... existing code ...

        $('#updateTicket').click(function (e) {
            e.preventDefault();
            var CRMContactID = $("input[name='selectedTransactionDetails']:checked").val();
            
            if (!CRMContactID) {
                showErrorPopup("Please select 1 Folio to insert");
                return;
            }
            
            // $('#errorPopup').remove();
            $('.loader-main').show();
            var onPage = $("#onPage").text();
            var folioNumber = $("input[name='selectedTransactionDetails']:checked").attr("attrFolio");
            var attrFundName = $("input[name='selectedTransactionDetails']:checked").attr("attrFundName");
            var attrFundType = $("input[name='selectedTransactionDetails']:checked").attr("attrFundType");

            var appReqUbj = {
                url: 'https://www.zohoapis.in/crm/v2/Contacts/' + CRMContactID,
                headers: {
                    'Content-Type': 'application/json'
                },
                data: {},
                type: 'GET',
                postBody: {},
                connectionLinkName: "getdataforsearch"
            }

            ZOHODESK.request(appReqUbj).then(function (response) {
                var json2 = JSON.parse(response);
                var finalJSON2 = JSON.parse(json2.response);
                if (!finalJSON2.statusMessage || !finalJSON2.statusMessage.data || finalJSON2.statusMessage.data.length === 0) {
                    showErrorPopup("Contact data not found");
                    return;
                }
                var contactDATA = finalJSON2.statusMessage.data[0];
                var email = contactDATA.Email;
                if (email == null) {
                    showErrorPopup("No Email Associated with this contact, Please update in CRM");
                    return;
                } else if (email.match(/\+\d+@/)) {
                    email = email.replace(/\+\d+@/, '@');
                }
                var reqObj25 = {
                    url: 'https://desk.zoho.in/api/v1/contacts/search?limit=1&email=' + email,
                    headers: {
                        'Content-Type': 'application/json',
                        'orgId': '60008685375'
                    },
                    data: {},
                    type: 'GET',
                    postBody: {},
                    connectionLinkName: "ticketconnection"
                }
                var deskContactID = '';
                ZOHODESK.request(reqObj25).then(function (response) {
                    var json3 = JSON.parse(response);
                    var finalJSON3 = JSON.parse(json3.response);
                    if (finalJSON3.statusMessage != "" && finalJSON3.statusMessage.data && finalJSON3.statusMessage.data.length > 0) {
                        var deskContactID = finalJSON3.statusMessage.data[0].id;
                        $("#deskContactID").text(deskContactID);
                    }
                });

                setTimeout(function () {
                    if (onPage == 'addpage') {
                        $("#innerSuccessTab").html("Success! Your data will Insert in the field");
                        $("#successTab").show();
                        $('.foliosearchdiv').hide();
                        $('.loader-main').hide();
                        $("#errorTab").hide();
                        if (email.match(/\+\d+@/)) {
                            email = email.replace(/\+\d+@/, '@');
                        }
                        ZOHODESK.set("ticketForm.cf_pan_number", {
                            value: contactDATA.PAN_Number
                        });
                        ZOHODESK.set("ticketForm.cf_fund_name", {
                            value: attrFundName
                        });
                        ZOHODESK.set("ticketForm.cf_plan_type", {
                            value: attrFundType
                        });
                        ZOHODESK.set("ticketForm.cf_register_email", {
                            value: email
                        });
                        ZOHODESK.set("ticketForm.cf_register_phone", {
                            value: contactDATA.Mobile
                        });
                        ZOHODESK.set("ticketForm.contactId", {
                            value: $("#deskContactID").text()
                        });
                        ZOHODESK.set("ticketForm.cf_related_to", {
                            value: 'Investor'
                        });
                        ZOHODESK.set("ticketForm.cf_folio_no", {
                            value: folioNumber
                        });
                        ZOHODESK.set("ticketForm.phone", {
                            value: contactDATA.Mobile
                        });
                    } else {
                        $("#innerSuccessTab").html("Success! Your data will Insert in the field");
                        $("#successTab").show();
                        $('.foliosearchdiv').hide();
                        $('.loader-main').hide();
                        $("#errorTab").hide();
                        ZOHODESK.set("ticketForm.cf_folio_no", {
                            value: folioNumber
                        });
                        ZOHODESK.set("ticketForm.cf_pan_number", {
                            value: contactDATA.PAN_Number
                        });
                        ZOHODESK.set("ticketForm.cf_fund_name", {
                            value: attrFundName
                        });
                        ZOHODESK.set("ticketForm.cf_plan_type", {
                            value: attrFundType
                        });
                        ZOHODESK.set("ticketForm.cf_register_email", {
                            value: contactDATA.Email
                        });
                        ZOHODESK.set("ticketForm.cf_register_phone", {
                            value: contactDATA.Mobile
                        });
                    }
                }, 2000);
            }).catch(function (err) {
                showErrorPopup("Please select 1 Folio to insert");
                console.log('Error');
                // console.log(err);
            });
        });
        $('input[name=searchby]').change(function () {
            if (this.value == 'foliono') {
                $(".searchmainbox").hide();
                $("#forFolio").show();

            } else if (this.value == 'email') {
                $(".searchmainbox").hide();
                $("#forEmail").show();
            } else if (this.value == 'pan') {
                $(".searchmainbox").hide();
                $("#forPAN").show();
            } else if (this.value == 'phone') {
                $(".searchmainbox").hide();
                $("#forMobile").show();
            } else if (this.value == 'accountno') {
                $(".searchmainbox").hide();
                $("#forBankAccount").show();
            }
        });
    </script>
</body>
